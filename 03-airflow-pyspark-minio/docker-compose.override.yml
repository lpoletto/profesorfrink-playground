services:
  # Object Storage (Simula AWS S3)
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    # environment:
    #   MINIO_ROOT_USER: admin
    #   MINIO_ROOT_PASSWORD: password123
    env_file:
      - .env
    ports:
      - "9000:9000" # API
      - "9001:9001" # Consola UI
    command: server /data --console-address ":9001"
    networks:
      - airflow
    volumes:
      - minio_data:/data

  # Data Warehouse (Simula AWS Redshift)
  postgres-dw:
    image: postgres:15
    # environment:
    #   POSTGRES_USER: dw_user
    #   POSTGRES_PASSWORD: dw_password
    #   POSTGRES_DB: datawarehouse
    env_file:
      - .env
    ports:
      - "5433:5432"
    networks:
      - airflow
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
  
  # Cluster de Spark (Master) - Imagen Oficial de Apache    
  spark-master:
    image: apache/spark:3.5.1
    entrypoint: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8081" # UI de Spark Master
      - "7077:7077" # Puerto del Master
    volumes:
      - ./include:/usr/local/airflow/include
      - ./apps:/opt/spark-apps
      - ./data:/opt/spark-data
    networks:
      - airflow

  # Cluster de Spark (Worker) - Imagen Oficial de Apache
  spark-worker:
    image: apache/spark:3.5.1
    entrypoint: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./include:/usr/local/airflow/include
      - ./apps:/opt/spark-apps
      - ./data:/opt/spark-data
    depends_on:
      - spark-master
    networks:
      - airflow

volumes:
  minio_data:
  postgres_dw_data: