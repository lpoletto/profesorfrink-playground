# Connector
connector.name=iceberg

# Catalog type: JDBC directo a PostgreSQL
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres-dw:5432/datawarehouse
iceberg.jdbc-catalog.connection-user=dw_user
iceberg.jdbc-catalog.connection-password=dw_password
iceberg.jdbc-catalog.catalog-name=lakehouse
iceberg.jdbc-catalog.default-warehouse-dir=s3://f1-data-lake/

# MinIO como storage (compatible S3)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.aws-access-key=admin
s3.aws-secret-key=password123
s3.path-style-access=true